<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OutLauncher | TailesOut Project</title>
    <style>
        body {
            background-color: #1a1a1a; /* Тот самый цвет из лаунчера [cite: 2026-02-26] */
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Тот самый редирект в углу */
        .news-link {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffcc00; /* Золотой как лого OL [cite: 2026-02-26] */
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }
        .news-link:hover { text-shadow: 0 0 10px #ffcc00; }

        .container { text-align: center; }

        h1 { font-size: 120px; margin: 0; color: #ffcc00; } /* Лого OL [cite: 2026-02-26] */
        p { color: #00ff00; font-weight: bold; font-size: 20px; }

        .download-btn {
            background-color: #00ff00; /* Зеленый как кнопка ИГРАТЬ [cite: 2026-02-26] */
            color: black;
            padding: 20px 40px;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            display: inline-block;
            margin-top: 30px;
            transition: transform 0.2s;
        }
        .download-btn:hover { transform: scale(1.1); background-color: #05cc05; }

        .info { margin-top: 40px; color: gray; font-size: 14px; }
    </style>
</head>
<body>

    <a href="/news" class="news-link">НОВОСТИ</a>

    <div class="container">
        <h1>OL</h1>
        <p>TailesOut Project</p>
        
        <a href="launcher.py" class="download-btn" download>СКАЧАТЬ ЛАУНЧЕР</a>

        <div class="info">
            <p style="color: gray; font-size: 14px;">
                *Для работы нужна Java 21 и Python 3.10+ [cite: 2026-02-26]
            </p>
        </div>
    </div>

</body>
</html>
